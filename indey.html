<!DOCTYPE html>
<html lang="cs">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Nicol Baranjuková</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            background-color: #ffe6f0; /* světle růžové pozadí */
            text-align: center;
            padding-top: 100px;
        }
        .container {
            background-color: #fff0f5; /* jemně růžový box */
            padding: 40px;
            margin: auto;
            width: 60%;
            box-shadow: 0 0 15px rgba(255,105,180,0.3);
            border-radius: 15px;
        }
        h1 {
            color: #d63384; /* tmavší růžová */
        }
        p {
            font-size: 18px;
            color: #a61e6e;
        }
    </style>
</head>
<body>

    <div class="container">
        <h1>Nicol Baranjuková</h1>
        <p>Studuji na gymplu v Praze a jsem ve čtvrťáku.</p>
    </div>

</body>
</html>
