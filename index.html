<!DOCTYPE html>
<html lang="cs">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Nicol Baranjuková</title>

<style>
    body {
        font-family: Arial, sans-serif;
        background-color: #ffe6f0;
        text-align: center;
        padding-top: 100px;
        overflow: hidden;
    }

    .container {
        background-color: #fff0f5;
        padding: 40px;
        margin: auto;
        width: 60%;
        box-shadow: 0 0 15px rgba(255,105,180,0.3);
        border-radius: 15px;
        position: relative;
        z-index: 2;
    }

    h1 { color: #d63384; }
    p { font-size: 18px; color: #a61e6e; }

    .cat {
        position: fixed;
        font-size: 60px;
        cursor: pointer;
        animation: fly linear infinite;
    }

    @keyframes fly {
        from { transform: translateX(-10vw); }
        to { transform: translateX(110vw); }
    }

    .bubble {
        position: fixed;
        background: white;
        padding: 10px 15px;
        border-radius: 20px;
        box-shadow: 0 0 10px rgba(0,0,0,0.2);
        font-size: 14px;
        color: #d63384;
        pointer-events: none;
        z-index: 3;
        animation: fadeOut 3s forwards;
    }

    @keyframes fadeOut {
        0% { opacity: 1; }
        80% { opacity: 1; }
        100% { opacity: 0; }
    }
</style>
</head>

<body>

<div class="container">
    <h1>Nicol Baranjuková</h1>
    <p>Studuji na gymplu v Praze a jsem ve čtvrťáku.</p>
</div>

<script>
function createCat(topPosition, duration) {
    const cat = document.createElement("div");
    cat.classList.add("cat");
    cat.style.top = topPosition + "vh";
    cat.style.animationDuration = duration + "s";
    cat.textContent = "🐱";

    cat.addEventListener("click", function(e) {
        const bubble = document.createElement("div");
        bubble.classList.add("bubble");
        bubble.style.left = e.clientX + "px";
        bubble.style.top = e.clientY + "px";
        bubble.textContent = "Dneska ti to sluší";
        document.body.appendChild(bubble);

        setTimeout(() => bubble.remove(), 3000);
    });

    document.body.appendChild(cat);
}

createCat(20, 12);
createCat(50, 10);
createCat(75, 14);
</script>

</body>
</html>
